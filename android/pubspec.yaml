name: musicsync
description: WLED ambient sync + control for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_colorpicker: ^1.1.0
  fftea: ^1.5.0
  permission_handler: ^11.3.1
  multicast_dns: ^0.3.3

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
