name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable

      - name: Build APK
        working-directory: android
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: MusicSync-android
          path: android/build/app/outputs/flutter-apk/app-release.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/build/app/outputs/flutter-apk/app-release.apk

  desktop:
    name: Desktop (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: .exe
            artifact: MusicSync.exe
          - os: macos-latest
            name: macos
            ext: ''
            artifact: MusicSync.app.zip
          - os: ubuntu-latest
            name: linux
            ext: ''
            artifact: MusicSync
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Linux: deps for Wails (WebKitGTK) + malgo (ALSA / Pulse headers)
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libasound2-dev libpulse-dev \
            pkg-config build-essential

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        run: wails build -platform windows/amd64

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: desktop
        run: |
          wails build -platform darwin/universal
          cd build/bin && zip -r MusicSync.app.zip MusicSync.app

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: desktop
        run: wails build -platform linux/amd64

      - uses: actions/upload-artifact@v4
        with:
          name: MusicSync-${{ matrix.name }}
          path: desktop/build/bin/${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/build/bin/${{ matrix.artifact }}
